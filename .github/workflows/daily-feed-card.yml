name: Daily Feed Card

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch feeds and render output without creating a card"
        required: false
        type: boolean
        default: false

jobs:
  post-daily-feed-card:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create daily feed card
        run: npm run daily-feed
        env:
          MEMOAPP_API_TOKEN: ${{ secrets.MEMOAPP_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          INTEREST_CATEGORIES_JSON: ${{ vars.INTEREST_CATEGORIES_JSON }}
          CATEGORY_MAX_ITEMS: ${{ vars.CATEGORY_MAX_ITEMS }}
          DISCOVERY_MAX_ITEMS: ${{ vars.DISCOVERY_MAX_ITEMS }}
          LOW_CONFIDENCE_MAX_ITEMS: ${{ vars.LOW_CONFIDENCE_MAX_ITEMS }}
          SOURCE_COVERAGE_MAX_ITEMS: ${{ vars.SOURCE_COVERAGE_MAX_ITEMS }}
          MIN_RELEVANCE: ${{ vars.MIN_RELEVANCE }}
          FEEDS_JSON: ${{ vars.FEEDS_JSON }}
          PARENT_CARD_ID: "88"
          TIME_ZONE: "Asia/Tokyo"
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && 'true' || 'false' }}
