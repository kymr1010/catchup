name: Daily Feed Card

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  post-daily-feed-card:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create daily feed card
        run: npm run daily-feed
        env:
          MEMOAPP_API_TOKEN: ${{ secrets.MEMOAPP_API_TOKEN }}
          INTERESTS: ${{ vars.INTERESTS }}
          FEEDS_JSON: ${{ vars.FEEDS_JSON }}
          PARENT_CARD_ID: "88"
          TIME_ZONE: "Asia/Tokyo"
